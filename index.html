function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

// 1. Mélange global des questions au démarrage
shuffle(questions);

let idx = 0, score = 0, timeLeft = 30, timer;

function load() {
    // FORCAGE : ici on limite explicitement à 30 questions max
    if (idx >= 30) {
        document.getElementById('quiz-content').style.display = 'none';
        document.getElementById('final-score').innerText = `Score : ${score} / 30`;
        document.getElementById('final-screen').style.display = 'block';
        return;
    }
    const q = questions[idx];
    // Affichage 30 fixe
    document.getElementById('q-meta').innerText = `QUESTION ${idx + 1}/30 - ${q.cat}`;
    document.getElementById('q-text').innerText = q.q;
    document.getElementById('feedback').style.display = 'none';
    const cont = document.getElementById('options'); cont.innerHTML = '';
    q.o.forEach(opt => {
        const b = document.createElement('button');
        b.className = 'opt-btn'; b.innerText = opt;
        b.onclick = () => reveal(opt);
        cont.appendChild(b);
    });
    startTimer();
}

// Reste du code inchangé (startTimer, reveal, nextQ)...
function startTimer() { timeLeft = 30; timer = setInterval(() => { timeLeft--; document.getElementById('timer').style.width = (timeLeft/30*100) + "%"; document.getElementById('timer-text').innerText = timeLeft + "s"; if(timeLeft<=0) reveal(null); }, 1000); }
function reveal(sel) { clearInterval(timer); if(sel === questions[idx].a) score++; document.getElementById('feedback').style.display = 'block'; document.getElementById('rationale').innerText = questions[idx].r; }
function nextQ() { idx++; load(); }
load();
</script>
