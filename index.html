<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Audi Twin Cup - Master Expert</title>
    <style>
        body { background: #050505; color: #ccc; font-family: 'Audi Type', Arial, sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: #111; padding: 40px; border-radius: 4px; border-left: 4px solid #f1052d; width: 100%; max-width: 800px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .q-meta { font-size: 0.8rem; color: #f1052d; text-transform: uppercase; letter-spacing: 2px; }
        .q-text { font-size: 1.4rem; color: #fff; margin: 20px 0; line-height: 1.5; }
        .img-container { margin: 20px 0; }
        .img-container img { max-width: 100%; border: 1px solid #333; }
        .opt-btn { display: block; width: 100%; background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 15px; margin: 8px 0; cursor: pointer; text-align: left; transition: 0.2s; }
        .opt-btn:hover:not(:disabled) { border-color: #f1052d; }
        .correct { background: #0b2e0b !important; border-color: #2e7d32 !important; }
        .wrong { background: #3e0b0b !important; border-color: #c62828 !important; }
        #feedback { margin-top: 20px; padding: 20px; background: #0a0a0a; border: 1px solid #222; display: none; }
    </style>
</head>
<body>

<div class="card">
    <div id="q-meta" class="q-meta"></div>
    <div id="q-text" class="q-text"></div>
    <div id="img-container" class="img-container"></div>
    <div id="options"></div>
    <div id="feedback">
        <p id="rationale"></p>
        <button onclick="nextQ()" style="padding: 10px 20px; cursor: pointer;">Question suivante</button>
    </div>
</div>

<script>
const questions = [
    {
        cat: "Technique - Châssis",
        q: "Sur l'Audi RS 3 (8Y), le 'RS Torque Splitter' remplace le différentiel arrière Haldex. Quelle est la différence fondamentale dans la gestion du couple par rapport au système précédent ?",
        o: ["Il utilise un accouplement visqueux central", "Il permet une vectorisation active du couple sur chaque roue arrière via deux embrayages multidisques pilotés", "Il bloque mécaniquement l'essieu arrière à 100%", "Il transfère le couple via une pompe hydraulique haute pression"],
        a: "Il permet une vectorisation active du couple sur chaque roue arrière via deux embrayages multidisques pilotés",
        r: "Le Torque Splitter ne se contente plus de répartir le couple entre les essieux, il gère activement la distribution latérale, permettant un torque vectoring complet et le mode 'Drift'.",
        img: null
    },
    {
        cat: "Histoire - Motorsport",
        q: "En 1980, Audi présente la 'Ur-Quattro'. Quelle innovation majeure dans la transmission intégrale a permis de réduire les tensions mécaniques en courbe par rapport aux systèmes 4x4 de l'époque ?",
        o: ["Le différentiel central à glissement limité", "L'arbre creux 'IHO' permettant un différentiel central traversé par l'arbre de transmission avant", "L'utilisation d'une boîte de transfert automatique", "Le découplage manuel des roues avant"],
        a: "L'arbre creux 'IHO' permettant un différentiel central traversé par l'arbre de transmission avant",
        r: "L'ingénieur Jörg Bensinger a conçu cet arbre creux, une astuce d'ingénierie qui a permis d'intégrer la transmission intégrale dans un véhicule de série compact sans rallonger excessivement l'empattement.",
        img: null
    }
];

let idx = 0;
function load() {
    const q = questions[idx];
    document.getElementById('q-meta').innerText = q.cat;
    document.getElementById('q-text').innerText = q.q;
    const imgDiv = document.getElementById('img-container');
    imgDiv.innerHTML = q.img ? `<img src="${q.img}">` : '';
    
    const cont = document.getElementById('options'); cont.innerHTML = '';
    q.o.forEach(opt => {
        const b = document.createElement('button');
        b.className = 'opt-btn'; b.innerText = opt;
        b.onclick = () => {
            document.querySelectorAll('.opt-btn').forEach(btn => btn.disabled = true);
            b.classList.add(opt === q.a ? 'correct' : 'wrong');
            document.getElementById('feedback').style.display = 'block';
            document.getElementById('rationale').innerText = q.r;
        };
        cont.appendChild(b);
    });
}
function nextQ() { idx++; idx < questions.length ? load() : alert("Module terminé"); load(); }
load();
</script>
</body>
</html>
