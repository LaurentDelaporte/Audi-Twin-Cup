<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Audi Twin Cup - Master Expert</title>
    <style>
        body { background: #050505; color: #ccc; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: #111; padding: 40px; border-radius: 4px; border-left: 4px solid #f1052d; width: 100%; max-width: 800px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .timer-bar { height: 6px; background: #333; margin-bottom: 5px; position: relative; }
        #timer { height: 100%; background: #f1052d; width: 100%; transition: width 1s linear; }
        #timer-text { color: #f1052d; font-size: 0.8rem; margin-bottom: 20px; font-weight: bold; }
        .q-meta { font-size: 0.7rem; color: #f1052d; text-transform: uppercase; margin-bottom: 10px; }
        .q-text { font-size: 1.3rem; color: #fff; margin-bottom: 20px; }
        .opt-btn { display: block; width: 100%; background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 15px; margin: 8px 0; cursor: pointer; text-align: left; transition: 0.2s; }
        .opt-btn:hover:not([disabled]) { background: #222; border-color: #f1052d; }
        .correct { background: #1b5e20 !important; border-color: #4caf50 !important; }
        .wrong { background: #b71c1c !important; border-color: #f44336 !important; }
        #feedback, #final-screen { margin-top: 20px; padding: 20px; background: #0a0a0a; display: none; border: 1px solid #222; text-align: center; }
        .btn-main { padding: 10px 25px; cursor:pointer; background: #f1052d; color: white; border: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div class="timer-bar"><div id="timer"></div></div>
    <div id="timer-text">30s</div>
    
    <div id="quiz-content">
        <div id="q-meta" class="q-meta"></div>
        <div id="q-text" class="q-text"></div>
        <div id="q-text" class="q-text"></div>
<img id="q-img" src="" style="display:none; width:100%; margin-bottom:20px; border-radius:4px;" alt="Visuel question">
<div id="options"></div>
        <div id="options"></div>
        <div id="feedback">
            <p id="rationale" style="color: #fff; font-size: 0.9rem; text-align: left;"></p>
            <button class="btn-main" onclick="nextQ()">Question suivante</button>
        </div>
    </div>

    <div id="final-screen">
        <h2 style="color: #fff;">Challenge terminé !</h2>
        <p id="final-score" style="font-size: 1.5rem; color: #f1052d;"></p>
        <button class="btn-main" onclick="location.reload()">Recommencer le quiz</button>
    </div>
</div>

<script>
const questions = [
{ "cat": "Visuel", "q": "Quel modèle mythique, ici en configuration rallye avec ses ailes larges, a révolutionné la transmission intégrale en 1980 ?", "inst": "Rechercher 'Audi Quattro rallye 1980 front view' sur Wikimedia Commons", "o": ["Audi Ur-Quattro", "Audi 80", "Audi 100", "Audi S1"], "a": "Audi Ur-Quattro", "r": "L'Ur-Quattro a prouvé au monde entier que le 4x4 était l'avenir du rallye." },
{ "cat": "Visuel", "q": "Ce break, célèbre pour son bleu emblématique et ses logos Porsche sur les étriers de freins, est le :", "inst": "Rechercher 'Audi RS2 Avant blue side view' sur Wikimedia Commons", "o": ["Audi RS2 Avant", "Audi RS4 Avant", "Audi RS6 Avant", "Audi S6 Avant"], "a": "Audi RS2 Avant", "r": "La RS2 est le premier modèle RS issu de la collaboration avec Porsche." },
{ "cat": "Visuel", "q": "Quel est ce modèle, surnommé 'le cigare' pour ses lignes fluides et son Cx record ?", "inst": "Rechercher 'Audi 100 C3 sedan' sur Wikimedia Commons", "o": ["Audi 100 (C3)", "Audi 80 (B2)", "Audi 200", "Audi A6"], "a": "Audi 100 (C3)", "r": "L'Audi 100 C3 a établi des standards d'aérodynamisme pour les berlines." },
{ "cat": "Visuel", "q": "Cette petite citadine tout en aluminium, rare et technologique, s'appelle :", "inst": "Rechercher 'Audi A2 silver side view' sur Wikimedia Commons", "o": ["Audi A2", "Audi A3", "Audi A1", "Audi TT"], "a": "Audi A2", "r": "L'A2 était une vitrine technologique d'Audi pour la consommation." },
{ "cat": "Visuel", "q": "Le design de ce coupé, reconnaissable à ses arches de toit en arc de cercle, est l'œuvre de :", "inst": "Rechercher 'Audi TT Mk1 silver front' sur Wikimedia Commons", "o": ["Audi TT (8N)", "Audi A5", "Audi R8", "Audi RS3"], "a": "Audi TT (8N)", "r": "Le TT Mk1 a marqué un tournant stylistique majeur pour Audi en 1998." },
{ "cat": "Visuel", "q": "Quel modèle de luxe des années 30, ici avec son logo aux 4 anneaux sur la calandre, est le :", "inst": "Rechercher 'Horch 853 1930s' sur Wikimedia Commons", "o": ["Horch 853", "Wanderer W24", "DKW F7", "Audi Front"], "a": "Horch 853", "r": "Horch représentait le summum du luxe chez Auto Union." },
{ "cat": "Visuel", "q": "Ce véhicule militaire 4x4, robuste et minimaliste, était produit par :", "inst": "Rechercher 'DKW Munga' sur Wikimedia Commons", "o": ["DKW", "Horch", "Wanderer", "Audi"], "a": "DKW", "r": "La Munga était le 4x4 de l'armée allemande par DKW." },
{ "cat": "Visuel", "q": "Cette berline, première à porter le nom 'V8' sur sa calandre, est l'ancêtre des :", "inst": "Rechercher 'Audi V8 sedan' sur Wikimedia Commons", "o": ["Audi A8", "Audi A6", "Audi 200", "Audi S8"], "a": "Audi A8", "r": "L'Audi V8 était la première incursion sérieuse d'Audi dans le segment luxe." },
{ "cat": "Visuel", "q": "Quel est ce prototype de supercar à moteur central, star des salons en 1991 ?", "inst": "Rechercher 'Audi Avus Quattro concept 1991' sur Wikimedia Commons", "o": ["Audi Avus Quattro", "Audi Rosemeyer", "Audi R8 Concept", "Audi Le Mans Quattro"], "a": "Audi Avus Quattro", "r": "L'Avus a montré pour la première fois le potentiel de l'aluminium." },
{ "cat": "Visuel", "q": "Cette voiture, dominatrice au Mans avec son moteur TDI, est la :", "inst": "Rechercher 'Audi R10 TDI Le Mans' sur Wikimedia Commons", "o": ["Audi R10 TDI", "Audi R8 LMP", "Audi R15 TDI", "Audi R18"], "a": "Audi R10 TDI", "r": "Première victoire d'un moteur diesel aux 24h du Mans." },
{ "cat": "Visuel", "q": "Le cockpit représenté ici, avec son écran central haute résolution derrière le volant, est le :", "inst": "Rechercher 'Audi Virtual Cockpit' sur Wikimedia Commons", "o": ["Audi Virtual Cockpit", "MMI Touch", "Audi Connect", "Digital Dashboard"], "a": "Audi Virtual Cockpit", "r": "Introduit sur le TT, il est devenu la référence du groupe." },
{ "cat": "Visuel", "q": "Quelle voiture est cette supercar de série, basée sur le châssis de la Lamborghini Gallardo ?", "inst": "Rechercher 'Audi R8 Gen 1 front' sur Wikimedia Commons", "o": ["Audi R8", "Audi TT RS", "Audi RS 6", "Audi RS 4"], "a": "Audi R8", "r": "L'Audi R8 a propulsé Audi dans le monde des supercars." },
{ "cat": "Visuel", "q": "Cette voiture de course, avec ses ailerons démesurés et ses prises d'air, est l'Audi :", "inst": "Rechercher 'Audi Sport Quattro S1 E2' sur Wikimedia Commons", "o": ["S1 E2", "Quattro A1", "80 Quattro", "Sport Quattro"], "a": "S1 E2", "r": "Le monstre ultime du Groupe B en rallye." },
{ "cat": "Visuel", "q": "Ce SUV imposant, ici en version Q7 V12 TDI, est le premier de la famille :", "inst": "Rechercher 'Audi Q7 V12 TDI' sur Wikimedia Commons", "o": ["Audi Q7", "Audi Q5", "Audi Q8", "Audi Allroad"], "a": "Audi Q7", "r": "Le Q7 a inauguré la gamme SUV d'Audi." },
{ "cat": "Visuel", "q": "Le logo ci-contre (Auto Union) représente l'union de combien de marques ?", "inst": "Rechercher 'Auto Union logo' sur Wikimedia Commons", "o": ["4", "3", "5", "2"], "a": "4", "r": "DKW, Horch, Wanderer et Audi." },
{ "cat": "Visuel", "q": "Ce prototype de supercar au design rétro, avec son moteur V16 visible, est :", "inst": "Rechercher 'Audi Rosemeyer concept' sur Wikimedia Commons", "o": ["Audi Rosemeyer", "Audi Avus", "Audi Le Mans", "Audi RSQ"], "a": "Audi Rosemeyer", "r": "Un hommage direct aux Flèches d'Argent Auto Union." },
{ "cat": "Visuel", "q": "Cette voiture, avec son look très aérodynamique et son moteur rotatif, est une :", "inst": "Rechercher 'NSU Ro80' sur Wikimedia Commons", "o": ["NSU Ro80", "Audi 100", "DKW F102", "Audi 80"], "a": "NSU Ro80", "r": "NSU, rachetée par Audi, était innovante avec son moteur Wankel." },
{ "cat": "Visuel", "q": "Ce break surélevé, avec ses protections en plastique noir, est un modèle :", "inst": "Rechercher 'Audi Allroad Quattro' sur Wikimedia Commons", "o": ["Allroad Quattro", "Avant", "Sportback", "Sedan"], "a": "Allroad Quattro", "r": "L'Allroad combine confort de berline et capacités tout-chemin." },
{ "cat": "Visuel", "q": "Quel modèle de course est ici représenté aux 24h du Mans, en version hybride ?", "inst": "Rechercher 'Audi R18 e-tron quattro' sur Wikimedia Commons", "o": ["Audi R18 e-tron", "Audi R10", "Audi R8", "Audi RS 6"], "a": "Audi R18 e-tron", "r": "L'apogée technologique d'Audi en endurance." },
{ "cat": "Visuel", "q": "La calandre représentée ici, massive et unique, s'appelle chez Audi :", "inst": "Rechercher 'Audi Singleframe grille' sur Wikimedia Commons", "o": ["Singleframe", "Doubleframe", "Sportgrille", "Diamond grill"], "a": "Singleframe", "r": "La calandre Singleframe est l'identité visuelle moderne de la marque." }   

];

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

// 1. Mélange global des questions au démarrage
shuffle(questions);

let idx = 0, score = 0, timeLeft = 30, timer;

function load() {
    if (idx >= 30) {
        document.getElementById('quiz-content').style.display = 'none';
        document.getElementById('final-score').innerText = `Score : ${score} / 30`;
        document.getElementById('final-screen').style.display = 'block';
        return;
    }

    const q = questions[idx];
    document.getElementById('q-meta').innerText = `QUESTION ${idx + 1}/30 - ${q.cat || "Expert"}`;
    document.getElementById('q-text').innerText = q.q;
    
    // --- GESTION IMAGE SIMPLIFIÉE ---
    const imgElement = document.getElementById('q-img');
    if (q.img) {
        imgElement.src = q.img;
        imgElement.style.display = "block";
    } else {
        imgElement.style.display = "none";
    }
    // --------------------------------

    document.getElementById('feedback').style.display = 'none';
    const cont = document.getElementById('options'); 
    cont.innerHTML = '';
    q.o.forEach(opt => {
        const b = document.createElement('button');
        b.className = 'opt-btn'; 
        b.innerText = opt;
        b.onclick = () => reveal(opt);
        cont.appendChild(b);
    });
    startTimer();
}

// Reste du code inchangé (startTimer, reveal, nextQ)...
function startTimer() { timeLeft = 30; timer = setInterval(() => { timeLeft--; document.getElementById('timer').style.width = (timeLeft/30*100) + "%"; document.getElementById('timer-text').innerText = timeLeft + "s"; if(timeLeft<=0) reveal(null); }, 1000); }
function reveal(sel) { clearInterval(timer); if(sel === questions[idx].a) score++; document.getElementById('feedback').style.display = 'block'; document.getElementById('rationale').innerText = questions[idx].r; }
function nextQ() { idx++; load(); }
load();
</script>
</body>
</html>
