<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Audi Twin Cup - Master Expert</title>
    <style>
        body { background: #050505; color: #ccc; font-family: 'Audi Type', Arial, sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: #111; padding: 40px; border-radius: 4px; border-left: 4px solid #f1052d; width: 100%; max-width: 800px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .q-meta { font-size: 0.8rem; color: #f1052d; text-transform: uppercase; letter-spacing: 2px; }
        .q-text { font-size: 1.4rem; color: #fff; margin: 20px 0; line-height: 1.5; }
        .img-container { margin: 20px 0; }
        .img-container img { max-width: 100%; border: 1px solid #333; }
        .opt-btn { display: block; width: 100%; background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 15px; margin: 8px 0; cursor: pointer; text-align: left; transition: 0.2s; }
        .opt-btn:hover:not(:disabled) { border-color: #f1052d; }
        .correct { background: #0b2e0b !important; border-color: #2e7d32 !important; }
        .wrong { background: #3e0b0b !important; border-color: #c62828 !important; }
        #feedback { margin-top: 20px; padding: 20px; background: #0a0a0a; border: 1px solid #222; display: none; }
    </style>
</head>
<body>

<div class="card">
    <div id="q-meta" class="q-meta"></div>
    <div id="q-text" class="q-text"></div>
    <div id="img-container" class="img-container"></div>
    <div id="options"></div>
    <div id="feedback">
        <p id="rationale"></p>
        <button onclick="nextQ()" style="padding: 10px 20px; cursor: pointer;">Question suivante</button>
    </div>
</div>

<script>
const questions = [
    {
        cat: "Technique - Châssis",
        q: "Sur l'Audi RS 3 (8Y), le 'RS Torque Splitter' remplace le différentiel arrière Haldex. Quelle est la différence fondamentale dans la gestion du couple par rapport au système précédent ?",
        o: ["Il utilise un accouplement visqueux central", "Il permet une vectorisation active du couple sur chaque roue arrière via deux embrayages multidisques pilotés", "Il bloque mécaniquement l'essieu arrière à 100%", "Il transfère le couple via une pompe hydraulique haute pression"],
        a: "Il permet une vectorisation active du couple sur chaque roue arrière via deux embrayages multidisques pilotés",
        r: "Le Torque Splitter ne se contente plus de répartir le couple entre les essieux, il gère activement la distribution latérale, permettant un torque vectoring complet et le mode 'Drift'.",
        img: null
    },
    {
        cat: "Histoire - Motorsport",
        q: "En 1980, Audi présente la 'Ur-Quattro'. Quelle innovation majeure dans la transmission intégrale a permis de réduire les tensions mécaniques en courbe par rapport aux systèmes 4x4 de l'époque ?",
        o: ["Le différentiel central à glissement limité", "L'arbre creux 'IHO' permettant un différentiel central traversé par l'arbre de transmission avant", "L'utilisation d'une boîte de transfert automatique", "Le découplage manuel des roues avant"],
        a: "L'arbre creux 'IHO' permettant un différentiel central traversé par l'arbre de transmission avant",
        r: "L'ingénieur Jörg Bensinger a conçu cet arbre creux, une astuce d'ingénierie qui a permis d'intégrer la transmission intégrale dans un véhicule de série compact sans rallonger excessivement l'empattement.",
        img: null
    },
    {
        cat: "Technique - Électronique de puissance",
        q: "L'architecture 800V de l'Audi e-tron GT repose sur des onduleurs à semi-conducteurs. Quel matériau est utilisé pour optimiser les pertes par commutation par rapport au silicium traditionnel ?",
        o: ["Arséniure de gallium (GaAs)", "Carbure de silicium (SiC)", "Nitrures de gallium (GaN)", "Oxyde de zinc (ZnO)"],
        a: "Carbure de silicium (SiC)",
        r: "Le SiC permet une efficacité thermique supérieure et des fréquences de commutation plus élevées, réduisant la taille des onduleurs et augmentant l'autonomie.",
        img: null
    },
    {
        cat: "Histoire - Motorsport",
        q: "En 1987, Walter Röhrl remporte Pikes Peak avec l'Audi S1. Quelle modification aérodynamique extrême a été rendue nécessaire par la puissance du moteur 5 cylindres turbocompressé ?",
        o: ["Un aileron arrière en fibre de carbone réglable", "Un splitter avant proéminent et une aile arrière surdimensionnée pour l'appui", "Un fond plat à effet de sol", "Des flaps mobiles motorisés"],
        a: "Un splitter avant proéminent et une aile arrière surdimensionnée pour l'appui",
        r: "L'aérodynamique était cruciale pour maintenir la motricité sur les portions non goudronnées et compenser la perte de densité de l'air en altitude.",
        img: null
    },
    {
        cat: "Technique - Thermodynamique",
        q: "Comment l'Audi RS 6 (C8) gère-t-elle la désactivation des cylindres (COD) lors des phases de faible charge ?",
        o: ["En coupant l'injection sur les cylindres 2, 3, 5 et 8", "En fermant électroniquement les soupapes d'admission et d'échappement par décalage d'arbres à cames", "En désaccouplant l'arbre de transmission", "Par une double injection directe"],
        a: "En fermant électroniquement les soupapes d'admission et d'échappement par décalage d'arbres à cames",
        r: "Le système Audi valvelift system (AVS) ferme les soupapes pour transformer les cylindres en 'pompes à air' passives, minimisant les pertes par pompage.",
        img: null
    },
    {
        cat: "Technique - Châssis",
        q: "Que permet le système 'Quattro ultra' (disponible sur plateformes MLB) par rapport au Quattro traditionnel permanent ?",
        o: ["Une réduction de la garde au sol", "Un découplage total de l'arbre de transmission arrière via deux embrayages pour réduire les traînées mécaniques", "Une gestion purement électronique sans différentiel central", "Une transmission intégrale uniquement électrique"],
        a: "Un découplage total de l'arbre de transmission arrière via deux embrayages pour réduire les traînées mécaniques",
        r: "Le Quattro ultra analyse en continu les paramètres de conduite et peut réengager le train arrière en moins de 250 millisecondes si besoin.",
        img: null
    },
    {
        cat: "Histoire - Marque",
        q: "Quel était le rôle des quatre anneaux avant la fusion de 1932 (Auto Union) ?",
        o: ["Ils symbolisaient les 4 roues motrices", "Ils représentaient les 4 marques fusionnées : Audi, DKW, Horch et Wanderer", "Ils représentaient les 4 fondateurs de l'entreprise", "Ils étaient le logo original d'Audi"],
        a: "Ils représentaient les 4 marques fusionnées : Audi, DKW, Horch et Wanderer",
        r: "Face à la Grande Dépression, ces quatre constructeurs saxons se sont unis pour survivre, formant le groupe Auto Union.",
        img: null
    },
    {
        cat: "Technique - Software",
        q: "Qu'est-ce que le 'Predictive Efficiency Assist' (PEA) utilise dans le MMI pour anticiper la consommation d'énergie ?",
        o: ["Uniquement la caméra frontale", "Les données cartographiques GPS (topographie, virages, limitations) couplées aux capteurs radars", "L'historique de conduite du conducteur uniquement", "Le mode Sport actif"],
        a: "Les données cartographiques GPS (topographie, virages, limitations) couplées aux capteurs radars",
        r: "Le système adapte la régénération d'énergie et la roue libre avant même que le conducteur n'atteigne le point de décélération.",
        img: null
    },
    {
        cat: "Technique - Moteur",
        q: "Quel est l'avantage technique du placement des turbocompresseurs dans le 'V' des moteurs Audi V8 4.0 TFSI (Hot-V) ?",
        o: ["Meilleur refroidissement par eau", "Réduction du 'turbolag' par diminution de la distance entre échappement et turbine", "Installation plus facile dans le compartiment moteur", "Augmentation de la pression d'huile"],
        a: "Réduction du 'turbolag' par diminution de la distance entre échappement et turbine",
        r: "Le trajet des gaz d'échappement vers la turbine est réduit au minimum, ce qui permet une montée en pression quasi instantanée.",
        img: null
    },
    {
        cat: "Technique - Éclairage",
        q: "Quelle est la particularité des 'Digital Matrix LED' sur l'Audi e-tron ?",
        o: ["Ils projettent des publicités au sol", "Ils utilisent des miroirs DMD (Digital Micromirror Device) pour une précision de faisceau exceptionnelle", "Ils remplacent les feux de jour", "Ils permettent une vision nocturne thermique"],
        a: "Ils utilisent des miroirs DMD (Digital Micromirror Device) pour une précision de faisceau exceptionnelle",
        r: "Grâce à des millions de micro-miroirs, la lumière peut être dirigée avec une précision chirurgicale, évitant l'éblouissement tout en éclairant les zones complexes.",
        img: null
    }
];

let idx = 0;
function load() {
    const q = questions[idx];
    document.getElementById('q-meta').innerText = q.cat;
    document.getElementById('q-text').innerText = q.q;
    const imgDiv = document.getElementById('img-container');
    imgDiv.innerHTML = q.img ? `<img src="${q.img}">` : '';
    
    const cont = document.getElementById('options'); cont.innerHTML = '';
    q.o.forEach(opt => {
        const b = document.createElement('button');
        b.className = 'opt-btn'; b.innerText = opt;
        b.onclick = () => {
            document.querySelectorAll('.opt-btn').forEach(btn => btn.disabled = true);
            b.classList.add(opt === q.a ? 'correct' : 'wrong');
            document.getElementById('feedback').style.display = 'block';
            document.getElementById('rationale').innerText = q.r;
        };
        cont.appendChild(b);
    });
}
function nextQ() { idx++; idx < questions.length ? load() : alert("Module terminé"); load(); }
load();
</script>
</body>
</html>
