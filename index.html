<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <style>
        :root { --audi-red: #f1052d; --bg: #0b0b0b; --panel: #1a1a1a; --text: #e5e5e5; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 850px; }
        .card { background: var(--panel); padding: 25px; border-radius: 8px; border-top: 5px solid var(--audi-red); box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .timer-box { font-size: 1.5rem; font-weight: bold; color: var(--audi-red); border: 2px solid var(--audi-red); border-radius: 50%; width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; }
        .q-text { font-size: 1.2rem; margin: 20px 0; line-height: 1.5; min-height: 80px; font-weight: 500; color: #fff; }
        .tag { font-weight: bold; font-size: 0.8rem; margin-bottom: 5px; display: inline-block; padding: 2px 8px; border-radius: 3px; text-transform: uppercase; margin-right: 5px; }
        .tag-visual { background: #00a3ff; color: white; }
        .tag-expert { background: #ff8c00; color: white; }
        .options { display: grid; gap: 12px; }
        .opt-btn { background: #262626; border: 1px solid #3d3d3d; color: white; padding: 18px; text-align: left; cursor: pointer; transition: 0.2s; font-size: 1rem; border-radius: 4px; }
        .opt-btn:hover:not(:disabled) { border-color: var(--audi-red); background: #333; }
        .correct { background: #28a745 !important; border-color: #28a745 !important; }
        .wrong { background: #dc3545 !important; border-color: #dc3545 !important; }
        #feedback { margin-top: 25px; padding: 20px; background: #000; border-left: 4px solid var(--audi-red); display: none; }
        .next-btn { background: var(--audi-red); color: white; border: none; padding: 15px; margin-top: 15px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; border-radius: 4px; }
        .progress-bar { height: 6px; background: #333; width: 100%; margin-top: 10px; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--audi-red); width: 0%; transition: 0.4s; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="header">

                <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
            </div>
            <div class="timer-box" id="timer">30</div>
        </div>

        <div id="quiz-ui">
            <div id="q-number" style="color: var(--audi-red); font-weight: bold; font-family: monospace;">QUESTION 1/30</div>
            <div id="q-container">
                <div class="q-text" id="q-text">Chargement...</div>
            </div>
            <div class="options" id="options"></div>

            <div id="feedback">
                <div id="result-title" style="font-weight: bold; margin-bottom: 5px;"></div>
                <div id="rationale" style="font-size: 0.95rem; color: #bbb; line-height: 1.4;"></div>

            </div>
        </div>
        
        <div id="final-screen" style="display:none; text-align: center; padding: 40px 0;">

            <div id="final-score" style="font-size: 1.5rem; margin: 20px 0;"></div>
            <button class="next-btn" onclick="location.reload()">Nouvelle session (30 Q aléatoires)</button>
        </div>
    </div>
</div>

let selectedQuestions = [];
let currentIdx = 0;
let score = 0;
let timeLeft = 30;
let timerId = null;

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function initQuiz() {
    const shuffledPool = shuffle([...allQuestions]);
    selectedQuestions = shuffledPool.slice(0, 30);
    selectedQuestions.forEach(q => q.o = shuffle([...q.o]));
    loadQuestion();
}

function startTimer() {
    clearInterval(timerId);
    timeLeft = 30;
    document.getElementById('timer').innerText = timeLeft;
    document.getElementById('timer').style.color = "var(--audi-red)";
    
    timerId = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').innerText = timeLeft;
        if(timeLeft <= 5) document.getElementById('timer').style.color = "orange";
        if(timeLeft <= 0) {
            clearInterval(timerId);
            checkAnswer(null);
        }
    }, 1000);
}

function loadQuestion() {
    const q = selectedQuestions[currentIdx];
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('progress').style.width = `${(currentIdx / 30) * 100}%`;
    document.getElementById('q-number').innerText = `QUESTION ${currentIdx + 1}/30`;
    
    let tagsHTML = '';
    if(q.v) tagsHTML += `<span class="tag tag-visual">Analyse Visuelle</span>`;
    if(q.e) tagsHTML += `<span class="tag tag-expert">Expert</span>`;
    
    document.getElementById('q-text').innerHTML = tagsHTML + `<div>${q.q}</div>`;
    
    const optCont = document.getElementById('options');
    optCont.innerHTML = '';
    
    q.o.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(opt);
        optCont.appendChild(btn);
    });
    
    startTimer();
}

function checkAnswer(selected) {
    clearInterval(timerId);
    const q = selectedQuestions[currentIdx];
    const btns = document.querySelectorAll('.opt-btn');
    
    btns.forEach(b => {
        b.disabled = true;
        if(b.innerText === q.a) b.classList.add('correct');
        if(selected && b.innerText === selected && selected !== q.a) b.classList.add('wrong');
    });

    const resTitle = document.getElementById('result-title');
    if(selected === q.a) {
        score++;
        resTitle.innerText = "SUCCÈS : DIAGNOSTIC CORRECT";
        resTitle.style.color = "#28a745";
    } else {
        resTitle.innerText = selected === null ? "TEMPS ÉCOULÉ" : "ERREUR DE RÉFÉRENCE";
        resTitle.style.color = "#dc3545";
    }

    document.getElementById('rationale').innerText = q.r;
    document.getElementById('feedback').style.display = 'block';
}

function nextQuestion() {
    currentIdx++;
    if(currentIdx < 30) loadQuestion();
    else showFinal();
}

function showFinal() {
    document.getElementById('quiz-ui').style.display = 'none';
    const final = document.getElementById('final-screen');
    final.style.display = 'block';
    
    let rank = score >= 28 ? "MAÎTRE TECHNIQUE AUDI" : score >= 22 ? "EXPERT RÉSEAU" : "COLLABORATEUR SERVICE";
    document.getElementById('final-score').innerHTML = `Score Final : <strong>${score}/30</strong><br><small>Rang obtenu : ${rank}</small>`;
}

window.onload = initQuiz;
</script>
