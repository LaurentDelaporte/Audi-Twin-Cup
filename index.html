let currentIdx = 0;
let seconds = 0;
let timerInterval;

function startTimer() {
    timerInterval = setInterval(() => {
        seconds++;
        document.getElementById('chrono').innerText = seconds + "s";
    }, 1000);
}

function loadQ() {
    if(currentIdx >= quizHistoryTech.length) { 
        clearInterval(timerInterval);
        document.getElementById('game-view').innerHTML = "<h2>FIN DE L'ÉPREUVE</h2><p>Temps total : " + seconds + " secondes.</p><button onclick='location.reload()'>REFAIRE LE TEST</button>"; 
        return; 
    }
    const q = quizHistoryTech[currentIdx];
    document.getElementById('question-text').innerText = (currentIdx + 1) + ". " + q.q;
    const cont = document.getElementById('options-container');
    cont.innerHTML = '';
    q.o.forEach((opt, i) => {
        const b = document.createElement('button');
        b.innerText = opt;
        b.onclick = () => reveal(i);
        cont.appendChild(b);
    });
    document.getElementById('insight-box').style.display = 'none';
}

function reveal(idx) {
    const correct = quizHistoryTech[currentIdx].a;
    const btns = document.querySelectorAll('.options button');
    btns.forEach((b, i) => {
        b.disabled = true;
        if(i === correct) b.classList.add('correct');
        else if(i === idx) b.classList.add('wrong');
    });
    document.getElementById('insight-text').innerText = quizHistoryTech[currentIdx].i;
    document.getElementById('insight-box').style.display = 'block';
}

function nextQuestion() {
    currentIdx++;
    loadQ();
}

loadQ();
startTimer();
</script>
